add_newline = false
command_timeout = 150

[character]
success_symbol = '[\$](bold yellow)'

## Configure the number of directories to truncate in the current path
[directory]
truncation_length = 0
truncate_to_repo = true
style = "blue"

## Configure the duration of the last command
[cmd_duration]
min_time = 100
disabled = true
style = "dimmed white"

[battery]
full_symbol = "пүҖ"
charging_symbol = "п–Ү"
discharging_symbol = "пү„"

[jobs]
symbol = "пҗЈ"

[package]
symbol = "пЈ– "
style = "dimmed white"

[env_var.http_proxy]
symbol = "рҹӘң"
format = "[$symbol]()"

[env_var.all_proxy]
symbol = "рҹҡӮ"
format = "[$symbol]()"

# git

[git_branch]
style = "green"

[git_status]
conflicted = " пғ¬ "
deleted = " п«§"
modified = " п…Ӣ "
stashed = " оүҖ "
staged = " пғҫ "
renamed = " п‘ҡ "
untracked = " пҒҷ "
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
ignore_submodules = true

